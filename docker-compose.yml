services:
  asterdrive:
    image: ghcr.io/apts-1547/asterdrive:stable
    # Or use `image: e1saps/asterdrive:stable` to pull from Docker Hub.
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
      - /etc/localtime:/etc/localtime:ro
    environment:
      - ASTER__SERVER__HOST=0.0.0.0
      - ASTER__DATABASE__URL=sqlite:///data/asterdrive.db?mode=rwc
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3000/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    stop_grace_period: 45s
    restart: unless-stopped

  aria2:
    image: p3terx/aria2-pro:latest
    profiles:
      - aria2
    expose:
      - "6800"
    volumes:
      # AsterDrive passes absolute temp paths such as /data/.tmp/... to aria2.
      # Keep this mount path identical to the asterdrive service.
      - ./data:/data
      - ./aria2-config:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      - PUID=10001
      - PGID=10001
      - UMASK_SET=022
      - RPC_PORT=6800
      - RPC_SECRET=${ASTERDRIVE_ARIA2_RPC_SECRET}
    restart: unless-stopped
